name: Successfully Starts when Merging

on: 
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install & Build Server
        working-directory: server
        run: |
          npm ci
          node --check index.js

      - name: Install & Build Client
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Lint Client
        working-directory: client
        run: npm run lint

      - name: Test Server
        working-directory: server
        run: npm test

      - name: Test Client
        working-directory: client
        run: npm test
